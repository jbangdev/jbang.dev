  - author: "Gimi Liang"
    handle: "lzhm"
    date: "February 10, 2022"
    url: "https://x.com/lzhm/status/1491678531515912195"
    text: "@jbangdev just blew my mind. It definitely brings Java to another level. I would argue that Java could be a better choice than Go for writing scripts/CLIs with @jbangdev"

  - author: "Patrick Baumgartner"
    handle: "patbaumgartner"
    date: "January 27, 2022"
    url: "https://x.com/patbaumgartner/status/1486628021364834304"
