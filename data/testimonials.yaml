  - author: "Preslav Rachev"
    handle: "preslavrachev"
    date: "September 1, 2022"
    url: "https://x.com/preslavrachev/status/1565402621334228994"
    text: "JBang (@jbangdev) is seriously bringing back the joy of creating CLIs and tooling in Java! I've spent the last few years writing those exclusively in Go, but JBang makes this an almost analogous experience on the JVM front. Great work, @maxandersen!"

  - author: "Maciej Walkowiak"
    handle: "maciejwalkowiak"
    date: "November 2, 2022"
    url: "https://x.com/maciejwalkowiak/status/1587725985423704064"
    text: "Single file Java applications with @jbangdev. JBang is mindblowing. I use it when I need to quickly try out a library and don't want to waste any time. Strong recommendation!"

